openapi: 3.1.0
info:
  title: Fractonica Node API
  version: 1.0.0
  license:
    name: AGPL-3.0-or-later
    url: https://www.gnu.org/licenses/agpl-3.0.html
  description: >-
    Loopback node health, content, Saros, and glyph services. The signed graph
    and client query endpoints are composed with this foundation into the one
    served Fractonica API contract.
    The `saros` profile is stateless and serves only temporal/geometry routes;
    the `node` profile also owns local SQLite storage. The server must not bind
    to a non-loopback interface until pairing and authentication have been
    specified and implemented.
    A running node rewrites the served document's top-level `security`
    requirement to bearer-only when `--bootstrap-token` is configured and to
    anonymous loopback otherwise.
servers:
  - url: http://127.0.0.1:8789
    description: Local node
tags:
  - name: Health
    description: Process and profile readiness probes.
  - name: Node
    description: Local node-profile identity and declared capabilities.
  - name: Content
    description: >-
      Stateful content-addressed blob discovery, tus 1.0.0 resumable upload,
      and immutable byte streaming. These routes return 503 from `saros`.
  - name: Saros
    description: Deterministic temporal readings and reviewed eclipse geometry.
  - name: Glyphs
    description: Canonical octal-glyph grammar, versioned font outlines, compound contour geometry, and raw RGBA8 raster output.
security:
  - bootstrapBearer: []
paths:
  /health/live:
    get:
      tags:
        - Health
      summary: Check whether the node process is alive
      operationId: getLiveness
      responses:
        "200":
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStatus"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
  /health/ready:
    get:
      tags:
        - Health
      summary: Check whether the node can serve requests
      operationId: getReadiness
      responses:
        "200":
          description: The selected node profile is ready to serve requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyStatus"
        "503":
          description: The node is not ready.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
  /api/node:
    get:
      tags:
        - Node
      summary: Describe the local node profile and installation
      operationId: getNode
      responses:
        "200":
          description: Local node information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeInfo"
        "503":
          description: The node cannot provide its descriptor yet.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
  /api/uploads:
    options:
      tags:
        - Content
      summary: Discover resumable upload capabilities
      operationId: getUploadCapabilities
      responses:
        "204":
          description: >-
            The node supports tus 1.0.0 creation, expiration, and checksum
            extensions with the advertised limits.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Tus-Version:
              $ref: "#/components/headers/TusVersion"
            Tus-Extension:
              $ref: "#/components/headers/TusExtension"
            Tus-Max-Size:
              $ref: "#/components/headers/TusMaxSize"
            Tus-Checksum-Algorithm:
              $ref: "#/components/headers/TusChecksumAlgorithm"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    post:
      tags:
        - Content
      summary: Create an empty tus upload resource
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: createUpload
      parameters:
        - $ref: "#/components/parameters/TusResumableRequest"
        - $ref: "#/components/parameters/UploadLengthRequest"
        - $ref: "#/components/parameters/UploadMetadataRequest"
      responses:
        "201":
          description: >-
            Upload staging was created at the returned Location. A zero-byte
            upload may already be committed and include Fractonica-Content-Id.
          headers:
            Location:
              $ref: "#/components/headers/UploadLocation"
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
            Fractonica-Content-Id:
              $ref: "#/components/headers/FractonicaContentId"
        "400":
          $ref: "#/components/responses/TusProblemResponse"
        "401":
          $ref: "#/components/responses/TusProblemResponse"
        "412":
          description: The requested tus version is unsupported.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Tus-Version:
              $ref: "#/components/headers/TusVersion"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: Upload-Length exceeds the node's configured blob limit.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api/uploads/{uploadId}:
    head:
      tags:
        - Content
      summary: Inspect the durable offset of a tus upload
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: getUploadOffset
      parameters:
        - $ref: "#/components/parameters/UploadId"
        - $ref: "#/components/parameters/TusResumableRequest"
      responses:
        "200":
          description: Current durable upload offset and declared length.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Length:
              $ref: "#/components/headers/UploadLength"
            Upload-Metadata:
              $ref: "#/components/headers/UploadMetadata"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
            Fractonica-Content-Id:
              $ref: "#/components/headers/FractonicaContentId"
            Cache-Control:
              $ref: "#/components/headers/UploadCacheControl"
        "401":
          $ref: "#/components/responses/TusProblemResponse"
        "404":
          $ref: "#/components/responses/TusProblemResponse"
        "410":
          description: The unfinished upload expired and is no longer resumable.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "412":
          description: The requested tus version is unsupported.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Tus-Version:
              $ref: "#/components/headers/TusVersion"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      tags:
        - Content
      summary: Append one bounded chunk to a tus upload
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: appendUploadChunk
      parameters:
        - $ref: "#/components/parameters/UploadId"
        - $ref: "#/components/parameters/TusResumableRequest"
        - $ref: "#/components/parameters/UploadOffsetRequest"
        - $ref: "#/components/parameters/UploadChecksumRequest"
        - $ref: "#/components/parameters/UploadChunkLengthRequest"
      requestBody:
        required: true
        content:
          application/offset+octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: >-
            The chunk was durably accepted. When the upload becomes complete,
            Fractonica-Content-Id identifies the committed immutable blob.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
            Fractonica-Content-Id:
              $ref: "#/components/headers/FractonicaContentId"
        "400":
          description: Upload-Checksum uses an unsupported checksum algorithm.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "401":
          $ref: "#/components/responses/TusProblemResponse"
        "404":
          $ref: "#/components/responses/TusProblemResponse"
        "409":
          description: >-
            Upload-Offset does not equal the resource's current durable offset;
            the request body was not applied.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "410":
          description: The unfinished upload expired and is no longer resumable.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "412":
          description: The requested tus version is unsupported.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Tus-Version:
              $ref: "#/components/headers/TusVersion"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: >-
            The chunk exceeds 4 MiB or would advance beyond Upload-Length.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "415":
          description: Content-Type must be application/offset+octet-stream.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: >-
            The complete upload does not match the expected content ID
            declared in Upload-Metadata. The upload remains resumable from its
            last durable offset.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "460":
          description: >-
            The supplied chunk checksum did not match. The chunk was discarded
            and Upload-Offset was not changed.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
            Upload-Offset:
              $ref: "#/components/headers/UploadOffset"
            Upload-Expires:
              $ref: "#/components/headers/UploadExpires"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          headers:
            Tus-Resumable:
              $ref: "#/components/headers/TusResumable"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api/blobs/{contentId}:
    get:
      tags:
        - Content
      summary: Stream an immutable content-addressed blob
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: getBlob
      parameters:
        - $ref: "#/components/parameters/BlobContentId"
        - $ref: "#/components/parameters/BlobRangeRequest"
      responses:
        "200":
          description: Complete immutable blob bytes.
          headers:
            ETag:
              $ref: "#/components/headers/BlobEtag"
            Accept-Ranges:
              $ref: "#/components/headers/BlobAcceptRanges"
            Content-Length:
              $ref: "#/components/headers/BlobContentLength"
            Content-Digest:
              $ref: "#/components/headers/BlobContentDigest"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "206":
          description: >-
            One satisfiable byte range. Content-Digest covers the partial
            message content, as required by RFC 9530.
          headers:
            ETag:
              $ref: "#/components/headers/BlobEtag"
            Accept-Ranges:
              $ref: "#/components/headers/BlobAcceptRanges"
            Content-Length:
              $ref: "#/components/headers/BlobContentLength"
            Content-Range:
              $ref: "#/components/headers/BlobContentRange"
            Content-Digest:
              $ref: "#/components/headers/BlobContentDigest"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "416":
          description: The requested byte range is not satisfiable.
          headers:
            Content-Range:
              $ref: "#/components/headers/BlobUnsatisfiedContentRange"
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: The path does not contain a canonical content ID.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    head:
      tags:
        - Content
      summary: Inspect immutable blob metadata without transferring bytes
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: headBlob
      parameters:
        - $ref: "#/components/parameters/BlobContentId"
      responses:
        "200":
          description: >-
            Metadata for the complete selected representation. Repr-Digest,
            rather than Content-Digest, identifies the full blob because a
            HEAD response has no message content.
          headers:
            ETag:
              $ref: "#/components/headers/BlobEtag"
            Accept-Ranges:
              $ref: "#/components/headers/BlobAcceptRanges"
            Content-Length:
              $ref: "#/components/headers/BlobContentLength"
            Repr-Digest:
              $ref: "#/components/headers/BlobRepresentationDigest"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "422":
          description: The path does not contain a canonical content ID.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api/blobs/availability:
    post:
      tags:
        - Content
      summary: Resolve which content IDs are locally available
      security:
        - bootstrapBearer: []
        - pairedTransport: []
      operationId: getBlobAvailability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlobAvailabilityRequest"
      responses:
        "200":
          description: Available descriptors and content IDs missing from this node.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlobAvailabilityResponse"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "422":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          description: Persistent storage is unavailable for the selected profile.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
  /api/saros:
    get:
      tags:
        - Saros
      summary: Describe the local Saros engine and reviewed geometry release
      operationId: getSarosMetadata
      responses:
        "200":
          description: Exact temporal semantics and geometry release metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarosMetadata"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
  /api/glyphs:
    get:
      tags:
        - Glyphs
      summary: Describe the canonical octal-glyph grammar and default font
      operationId: getGlyphMetadata
      responses:
        "200":
          description: Versioned binary-stroke grammar, default font identity, and coordinate conventions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlyphMetadata"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
  /api/glyphs/{octal}/geometry:
    get:
      tags:
        - Glyphs
      summary: Resolve canonical compound contour geometry for an octal glyph
      operationId: getGlyphGeometry
      parameters:
        - $ref: "#/components/parameters/GlyphOctal"
        - $ref: "#/components/parameters/GlyphDepth"
      responses:
        "200":
          description: Normalized MSB-first geometry with a value-invariant frame.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlyphGeometry"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "422":
          $ref: "#/components/responses/ProblemResponse"
  /api/glyphs/{octal}/raster.rgba:
    get:
      tags:
        - Glyphs
      summary: Rasterize an octal glyph into raw straight-alpha RGBA8 bytes
      operationId: getGlyphRasterRgba
      parameters:
        - $ref: "#/components/parameters/GlyphOctal"
        - $ref: "#/components/parameters/GlyphDepth"
        - $ref: "#/components/parameters/GlyphRasterWidth"
        - $ref: "#/components/parameters/GlyphRasterHeight"
        - $ref: "#/components/parameters/GlyphForeground"
        - $ref: "#/components/parameters/GlyphBackground"
      responses:
        "200":
          description: Row-major raw bytes, one straight-alpha red/green/blue/alpha tuple per pixel.
          headers:
            X-Fractonica-Pixel-Format:
              description: Always `rgba8` for this endpoint.
              schema:
                type: string
                const: rgba8
            X-Fractonica-Width:
              description: Raster width in pixels.
              schema:
                type: integer
                minimum: 1
            X-Fractonica-Height:
              description: Raster height in pixels.
              schema:
                type: integer
                minimum: 1
            X-Fractonica-Stride-Bytes:
              description: Bytes in one row; always width multiplied by four.
              schema:
                type: integer
                minimum: 4
            X-Fractonica-Glyph-Grammar-Version:
              description: Version of the binary 1/2/4 digit grammar.
              schema:
                type: string
            X-Fractonica-Glyph-Geometry-Version:
              description: Geometry version selected by the default glyph font.
              schema:
                type: string
            X-Fractonica-Glyph-Font-Id:
              description: Stable identifier of the font used for rasterization.
              schema:
                type: string
            X-Fractonica-Glyph-Font-Version:
              description: Semantic version of the font used for rasterization.
              schema:
                type: string
            X-Fractonica-Glyph-Font-Sha256:
              description: SHA-256 digest of the canonical font document.
              schema:
                type: string
                pattern: "^[0-9a-f]{64}$"
          content:
            application/vnd.fractonica.rgba8:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "422":
          $ref: "#/components/responses/ProblemResponse"
  /api/saros/pulse:
    get:
      tags:
        - Saros
      summary: Resolve the two five-digit Saros pulse glyphs at an explicit instant
      operationId: getSarosPulse
      parameters:
        - $ref: "#/components/parameters/AtUnixSeconds"
        - $ref: "#/components/parameters/AtNanosecond"
        - name: anchorSaros
          in: query
          required: false
          description: Reviewed Saros series used as the pulse anchor. Defaults to 141.
          schema:
            type: integer
            minimum: 101
            maximum: 161
            default: 141
      responses:
        "200":
          description: Exact 30-bit pulse and its two MSB-first glyph halves.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarosPulse"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "422":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
  /api/saros/series/{saros}/reading:
    get:
      tags:
        - Saros
      summary: Resolve an exact Saros phase reading at an explicit instant
      operationId: getSarosReading
      parameters:
        - $ref: "#/components/parameters/SarosSeries"
        - $ref: "#/components/parameters/AtUnixSeconds"
        - $ref: "#/components/parameters/AtNanosecond"
        - name: precisionBits
          in: query
          required: false
          description: Number of requested MSB phase bits. Complete octal digits consume three bits.
          schema:
            type: integer
            minimum: 1
            maximum: 64
            default: 30
      responses:
        "200":
          description: Exact rational phase, fixed-point word and requested projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarosReading"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "422":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
  /api/saros/series/{saros}/eclipses/{sequence}/path:
    get:
      tags:
        - Saros
      summary: Return one reviewed compact eclipse path as GeoJSON coordinates
      operationId: getSarosEclipsePath
      parameters:
        - $ref: "#/components/parameters/SarosSeries"
        - name: sequence
          in: path
          required: true
          description: Zero-based stable sequence within the reviewed Saros series.
          schema:
            type: integer
            minimum: 0
            maximum: 255
      responses:
        "200":
          description: Reviewed eclipse metadata and its MultiPolygon path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EclipsePath"
        "401":
          $ref: "#/components/responses/BootstrapUnauthorized"
        "404":
          $ref: "#/components/responses/ProblemResponse"
        "503":
          $ref: "#/components/responses/ProblemResponse"
components:
  securitySchemes:
    bootstrapBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >-
        Optional per-launch credential used when the desktop supervisor starts
        a private node sidecar. Standalone loopback nodes may omit it.
    pairedTransport:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Pairing-scoped `Fractonica-Peer` credential for capability-authorized
        content availability, upload, and download on a trusted private LAN.
  responses:
    BootstrapUnauthorized:
      description: The supervised node requires its per-launch bearer token.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ProblemResponse:
      description: A stable RFC 9457-style problem response.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TusProblemResponse:
      description: A tus request failed with a structured problem response.
      headers:
        Tus-Resumable:
          $ref: "#/components/headers/TusResumable"
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        Opaque retry key scoped to the request actor. Reusing a key with the
        same canonical request replays the original response; reusing it with
        different content returns 409.
      schema:
        type: string
        minLength: 8
        maxLength: 200
        pattern: "^[!-~]{8,200}$"
    OperationsAfter:
      name: after
      in: query
      required: false
      description: >-
        Exclusive node-local sequence cursor. It has no meaning on another
        node and must not be used as a causal or globally ordered timestamp.
      schema:
        type: integer
        format: int64
        minimum: 0
        default: 0
    OperationsLimit:
      name: limit
      in: query
      required: false
      description: Maximum number of stored operations returned in this page.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 100
    EntityId:
      name: entityId
      in: path
      required: true
      description: Canonical entity UUID. Human-facing short IDs are aliases only.
      schema:
        type: string
        format: uuid
    UploadId:
      name: uploadId
      in: path
      required: true
      description: Opaque UUID of an unfinished or recently completed upload resource.
      schema:
        type: string
        format: uuid
    TusResumableRequest:
      name: Tus-Resumable
      in: header
      required: true
      description: tus protocol version selected by the client.
      schema:
        type: string
        const: 1.0.0
    UploadLengthRequest:
      name: Upload-Length
      in: header
      required: true
      description: Declared complete blob length in bytes. Deferred length is not supported.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 17179869184
    UploadMetadataRequest:
      name: Upload-Metadata
      in: header
      required: false
      description: >-
        Optional tus metadata as unique comma-separated key/Base64-value pairs.
        It is staging metadata and does not affect the content ID.
      schema:
        type: string
        maxLength: 8192
    UploadOffsetRequest:
      name: Upload-Offset
      in: header
      required: true
      description: Byte offset at which this chunk must begin.
      schema:
        type: integer
        format: int64
        minimum: 0
    UploadChecksumRequest:
      name: Upload-Checksum
      in: header
      required: false
      description: >-
        tus checksum-extension value for this PATCH body: a supported
        lowercase algorithm name, one space, and its Base64 digest.
      schema:
        type: string
        pattern: '^(sha1|sha256) [A-Za-z0-9+/]+={0,2}$'
    UploadChunkLengthRequest:
      name: Content-Length
      in: header
      required: true
      description: PATCH body length in bytes; Fractonica accepts at most 4 MiB per chunk.
      schema:
        type: integer
        format: int64
        minimum: 1
        maximum: 4194304
    BlobContentId:
      name: contentId
      in: path
      required: true
      description: Canonical SHA-256 content identifier.
      schema:
        $ref: "#/components/schemas/ContentId"
    BlobRangeRequest:
      name: Range
      in: header
      required: false
      description: One RFC 9110 byte range. Multiple ranges are not supported.
      schema:
        type: string
        pattern: '^bytes=([0-9]+-[0-9]*|-[0-9]+)$'
    SarosSeries:
      name: saros
      in: path
      required: true
      description: Saros series in the reviewed geometry release (101–161).
      schema:
        type: integer
        minimum: 101
        maximum: 161
    AtUnixSeconds:
      name: atUnixSeconds
      in: query
      required: true
      description: Explicit signed Unix UTC seconds. The server never reads the clock for deterministic routes.
      schema:
        type: integer
        format: int64
    AtNanosecond:
      name: atNanosecond
      in: query
      required: false
      description: Nanosecond fraction within the explicit Unix second.
      schema:
        type: integer
        minimum: 0
        maximum: 999999999
        default: 0
    GlyphOctal:
      name: octal
      in: path
      required: true
      description: One through eight MSB-first ASCII octal digits. Short values are left-padded by the selected depth.
      schema:
        type: string
        pattern: "^[0-7]{1,8}$"
    GlyphDepth:
      name: depth
      in: query
      required: false
      description: Number of radial digit sockets. Defaults to five.
      schema:
        type: integer
        minimum: 3
        maximum: 8
        default: 5
    GlyphRasterWidth:
      name: width
      in: query
      required: false
      description: Output width in pixels. Defaults to 128; maximum is 2048.
      schema:
        type: integer
        minimum: 1
        maximum: 2048
        default: 128
    GlyphRasterHeight:
      name: height
      in: query
      required: false
      description: Output height in pixels. Defaults to 128; maximum is 2048.
      schema:
        type: integer
        minimum: 1
        maximum: 2048
        default: 128
    GlyphForeground:
      name: foreground
      in: query
      required: false
      description: Foreground colour as RRGGBB or RRGGBBAA hexadecimal. Defaults to FFFFFFFF.
      schema:
        type: string
        pattern: "^#?[0-9A-Fa-f]{6}([0-9A-Fa-f]{2})?$"
    GlyphBackground:
      name: background
      in: query
      required: false
      description: Background colour as RRGGBB or RRGGBBAA hexadecimal. Defaults to transparent.
      schema:
        type: string
        pattern: "^#?[0-9A-Fa-f]{6}([0-9A-Fa-f]{2})?$"
  headers:
    TusResumable:
      description: tus protocol version used by this response.
      schema:
        type: string
        const: 1.0.0
    TusVersion:
      description: Supported tus protocol versions in server preference order.
      schema:
        type: string
        const: 1.0.0
    TusExtension:
      description: Supported tus extensions.
      schema:
        type: string
        const: creation,expiration,checksum
    TusMaxSize:
      description: Default maximum complete upload size in bytes (16 GiB).
      schema:
        type: integer
        format: int64
        const: 17179869184
    TusChecksumAlgorithm:
      description: >-
        Supported tus chunk-checksum algorithms. sha1 is required by tus 1.0.0;
        sha256 is preferred for new Fractonica clients.
      schema:
        type: string
        const: sha1,sha256
    UploadLocation:
      description: Relative or absolute URL of the created upload resource.
      schema:
        type: string
        format: uri-reference
    UploadOffset:
      description: Current durable byte offset within the upload resource.
      schema:
        type: integer
        format: int64
        minimum: 0
    UploadLength:
      description: Declared complete upload length in bytes.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 17179869184
    UploadMetadata:
      description: >-
        Original tus Upload-Metadata value supplied when the upload was
        created. Omitted when creation included no metadata.
      schema:
        type: string
        maxLength: 8192
    UploadExpires:
      description: >-
        RFC 9110 HTTP-date after which an unfinished upload cannot be resumed.
        Present whenever the upload is subject to expiration.
      schema:
        type: string
    FractonicaContentId:
      description: >-
        Present when the complete upload has been verified and committed into
        immutable content-addressed storage.
      schema:
        $ref: "#/components/schemas/ContentId"
    UploadCacheControl:
      description: Prevents caches from retaining mutable upload offset state.
      schema:
        type: string
        const: no-store
    BlobEtag:
      description: Strong validator equal to the quoted canonical content ID.
      schema:
        type: string
        pattern: '^"sha-256:[0-9a-f]{64}"$'
    BlobAcceptRanges:
      description: Indicates support for a single byte range.
      schema:
        type: string
        const: bytes
    BlobContentLength:
      description: Number of bytes in this response content.
      schema:
        type: integer
        format: int64
        minimum: 0
        maximum: 17179869184
    BlobContentDigest:
      description: >-
        RFC 9530 Content-Digest of the actual response content, encoded as an
        HTTP Structured Fields sha-256 Byte Sequence.
      schema:
        type: string
        pattern: '^sha-256=:[A-Za-z0-9+/]{43}=:$'
    BlobRepresentationDigest:
      description: >-
        RFC 9530 Repr-Digest of the complete selected blob representation.
      schema:
        type: string
        pattern: '^sha-256=:[A-Za-z0-9+/]{43}=:$'
    BlobContentRange:
      description: Byte range and complete blob size for a 206 response.
      schema:
        type: string
        pattern: '^bytes [0-9]+-[0-9]+/[0-9]+$'
    BlobUnsatisfiedContentRange:
      description: Complete blob size returned for an unsatisfied range.
      schema:
        type: string
        pattern: '^bytes \*/[0-9]+$'
  schemas:
    LiveStatus:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          const: up
    ReadyStatus:
      type: object
      additionalProperties: false
      required:
        - status
        - profile
        - storage
      properties:
        status:
          type: string
          const: ready
        profile:
          $ref: "#/components/schemas/NodeProfile"
        storage:
          $ref: "#/components/schemas/StorageReadyStatus"
    StorageReadyStatus:
      oneOf:
        - $ref: "#/components/schemas/SqliteStorageReadyStatus"
        - $ref: "#/components/schemas/NoStorageReadyStatus"
    SqliteStorageReadyStatus:
      type: object
      additionalProperties: false
      required:
        - kind
        - status
      properties:
        kind:
          type: string
          const: sqlite
        status:
          type: string
          const: ready
    NoStorageReadyStatus:
      type: object
      additionalProperties: false
      required:
        - kind
        - status
      properties:
        kind:
          type: string
          const: none
        status:
          type: string
          const: notConfigured
    NodeProfile:
      type: string
      enum: [node, saros]
    NodeInfo:
      oneOf:
        - $ref: "#/components/schemas/FullNodeInfo"
        - $ref: "#/components/schemas/SarosNodeInfo"
      description: >-
        Public node metadata. Full nodes disclose only self-certifying public
        IDs and trusted-space descriptors; no private key material is exposed.
    FullNodeInfo:
      type: object
      additionalProperties: false
      required:
        - installationId
        - nodeId
        - spaces
        - profile
        - displayName
        - version
        - startedAt
        - uptimeSeconds
        - capabilities
      properties:
        installationId:
          type: string
          minLength: 1
          maxLength: 128
          description: Persistent installation lifecycle ID.
        nodeId:
          $ref: "#/components/schemas/PublicNodeId"
        spaces:
          type: array
          maxItems: 4096
          items:
            $ref: "#/components/schemas/PublicSpaceDescriptor"
        profile:
          type: string
          const: node
        displayName:
          type: string
          minLength: 1
          maxLength: 128
        version:
          type: string
          minLength: 1
          maxLength: 64
        startedAt:
          type: string
          format: date-time
        uptimeSeconds:
          type: integer
          minimum: 0
        capabilities:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 64
    SarosNodeInfo:
      type: object
      additionalProperties: false
      required:
        - installationId
        - profile
        - displayName
        - version
        - startedAt
        - uptimeSeconds
        - capabilities
      properties:
        installationId:
          type: string
          const: saros-engine
        profile:
          type: string
          const: saros
        displayName:
          type: string
          minLength: 1
          maxLength: 128
        version:
          type: string
          minLength: 1
          maxLength: 64
        startedAt:
          type: string
          format: date-time
        uptimeSeconds:
          type: integer
          minimum: 0
        capabilities:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 64
    PublicNodeId:
      type: string
      pattern: '^node:ed25519:[0-9a-f]{64}$'
      description: Self-certifying Ed25519 node identity; this is not a secret key.
    PublicSpaceDescriptor:
      type: object
      additionalProperties: false
      required:
        - spaceId
        - displayName
        - genesisOperationId
        - initialGrantOperationId
        - controllerActorId
        - localWriterActorId
        - createdAtUnixMs
      properties:
        spaceId:
          type: string
          pattern: '^space:(?!0{64}$)[0-9a-f]{64}$'
        displayName:
          type: string
          minLength: 1
          maxLength: 128
        genesisOperationId:
          type: string
          pattern: '^sha-256:[0-9a-f]{64}$'
        initialGrantOperationId:
          type: string
          pattern: '^sha-256:[0-9a-f]{64}$'
        controllerActorId:
          type: string
          pattern: '^actor:ed25519:[0-9a-f]{64}$'
        localWriterActorId:
          type: string
          pattern: '^actor:ed25519:[0-9a-f]{64}$'
        createdAtUnixMs:
          type: integer
          format: int64
          minimum: 0
    OperationSubmission:
      type: object
      additionalProperties: false
      required:
        - protocolVersion
        - operationId
        - entityId
        - schema
        - causalParents
        - occurredAtUnixMs
        - body
      properties:
        protocolVersion:
          type: integer
          const: 1
        operationId:
          type: string
          format: uuid
          description: Canonical operation identifier generated by the submitting client.
        entityId:
          type: string
          format: uuid
          description: Canonical UUID of the entity affected by this operation.
        schema:
          type: string
          const: record
        causalParents:
          type: array
          maxItems: 64
          uniqueItems: true
          description: >-
            Canonical operation UUIDs observed as causal predecessors. An
            initial put uses an empty array; a merge put names every current
            head.
          items:
            type: string
            format: uuid
        occurredAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          description: Client-declared event time; it does not determine log order.
        body:
          $ref: "#/components/schemas/OperationBody"
    Operation:
      type: object
      additionalProperties: false
      required:
        - protocolVersion
        - operationId
        - entityId
        - actorId
        - schema
        - causalParents
        - occurredAtUnixMs
        - body
      properties:
        protocolVersion:
          type: integer
          const: 1
        operationId:
          type: string
          format: uuid
        entityId:
          type: string
          format: uuid
        actorId:
          type: string
          format: uuid
          description: >-
            Actor resolved by the node from trusted local context. In this
            loopback-only version it is the persistent installation identity;
            submitters cannot provide or override it.
        schema:
          type: string
          const: record
        causalParents:
          type: array
          maxItems: 64
          uniqueItems: true
          items:
            type: string
            format: uuid
        occurredAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        body:
          $ref: "#/components/schemas/OperationBody"
    OperationBody:
      oneOf:
        - $ref: "#/components/schemas/PutOperationBody"
        - $ref: "#/components/schemas/TombstoneOperationBody"
    PutOperationBody:
      type: object
      additionalProperties: false
      required:
        - kind
        - document
      properties:
        kind:
          type: string
          const: put
        document:
          $ref: "#/components/schemas/RecordDocument"
    TombstoneOperationBody:
      type: object
      additionalProperties: false
      required:
        - kind
      properties:
        kind:
          type: string
          const: tombstone
    RecordDocument:
      type: object
      additionalProperties: false
      required:
        - startAtUnixMs
        - visibility
      properties:
        startAtUnixMs:
          type: integer
          format: int64
          minimum: 0
        endAtUnixMs:
          type: integer
          format: int64
          minimum: 0
          description: When present, must be greater than or equal to startAtUnixMs.
        visibility:
          type: string
          enum: [public, private]
        emoji:
          type: string
          minLength: 1
          maxLength: 32
        text:
          type: string
          maxLength: 262144
        metadata:
          type: object
          maxProperties: 128
          additionalProperties: true
          description: Schema-specific JSON metadata retained without interpretation.
        resources:
          type: array
          maxItems: 64
          description: >-
            Ordered immutable content references. Array order is part of the
            record document and is preserved even when a blob is not local.
          items:
            $ref: "#/components/schemas/ResourceRef"
    ContentId:
      type: string
      pattern: '^sha-256:[0-9a-f]{64}$'
      description: >-
        Canonical identifier derived from the SHA-256 digest of the complete
        unencoded blob bytes. The hexadecimal digest is lowercase.
    ResourceRef:
      type: object
      additionalProperties: false
      required:
        - contentId
        - byteLength
        - mediaType
        - role
      properties:
        contentId:
          $ref: "#/components/schemas/ContentId"
        byteLength:
          type: integer
          format: int64
          minimum: 0
          maximum: 1099511627776
          description: Complete unencoded byte length asserted by this reference.
        mediaType:
          type: string
          minLength: 1
          maxLength: 127
          pattern: "^[A-Za-z0-9!#$%&'*+.^_`|~-]+/[A-Za-z0-9!#$%&'*+.^_`|~-]+$"
          description: Client-declared canonical media type; it is not part of the content ID.
        role:
          type: string
          minLength: 1
          maxLength: 64
          pattern: '^[a-z0-9._-]+$'
          description: Lowercase semantic role interpreted by the record schema.
        originalName:
          type: string
          minLength: 1
          maxLength: 255
          pattern: '^(?!\.{1,2}$)[^/\\:\u0000-\u001F\u007F-\u009F]+$'
          description: >-
            Optional path-free display label. Control characters, slash,
            backslash, colon, dot, and dot-dot are rejected.
    ContentDescriptor:
      type: object
      additionalProperties: false
      required:
        - contentId
        - byteLength
      properties:
        contentId:
          $ref: "#/components/schemas/ContentId"
        byteLength:
          type: integer
          format: int64
          minimum: 0
          maximum: 1099511627776
    BlobAvailabilityRequest:
      type: object
      additionalProperties: false
      required:
        - contentIds
      properties:
        contentIds:
          type: array
          minItems: 1
          maxItems: 256
          uniqueItems: true
          items:
            $ref: "#/components/schemas/ContentId"
    BlobAvailabilityResponse:
      type: object
      additionalProperties: false
      required:
        - available
        - missing
      properties:
        available:
          type: array
          maxItems: 256
          description: Locally committed blobs, in request order after missing IDs are removed.
          items:
            $ref: "#/components/schemas/ContentDescriptor"
        missing:
          type: array
          maxItems: 256
          uniqueItems: true
          description: Content IDs not currently committed on this node, in request order.
          items:
            $ref: "#/components/schemas/ContentId"
    StoredOperation:
      type: object
      additionalProperties: false
      required:
        - localSequence
        - operation
      properties:
        localSequence:
          type: integer
          format: int64
          minimum: 1
          description: >-
            Monotonic cursor assigned by this node only. It is not a causal,
            temporal, portable, or globally comparable identifier.
        operation:
          $ref: "#/components/schemas/Operation"
    OperationPage:
      type: object
      additionalProperties: false
      required:
        - operations
        - nextAfter
        - hasMore
      properties:
        operations:
          type: array
          maxItems: 200
          items:
            $ref: "#/components/schemas/StoredOperation"
        nextAfter:
          type: integer
          format: int64
          minimum: 0
          description: Cursor to pass as `after` when requesting the next page.
        hasMore:
          type: boolean
    EntityState:
      type: object
      additionalProperties: false
      required:
        - entityId
        - schema
        - operationCount
        - conflicted
        - heads
      properties:
        entityId:
          type: string
          format: uuid
        schema:
          type: string
          const: record
        operationCount:
          type: integer
          format: int64
          minimum: 1
        conflicted:
          type: boolean
          description: True when more than one concurrent current head is retained.
        heads:
          type: array
          minItems: 1
          maxItems: 64
          description: >-
            Current stored operations after causal ancestry is reduced. A
            tombstone remains a durable head until a later causal operation
            explicitly descends from it.
          items:
            $ref: "#/components/schemas/StoredOperation"
    SarosMetadata:
      type: object
      additionalProperties: false
      required:
        - semanticsVersion
        - geometry
      properties:
        semanticsVersion:
          type: string
          const: 1.0.0
        geometry:
          $ref: "#/components/schemas/GeometryRelease"
    GeometryRelease:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - datasetId
        - artifact
        - source
        - review
        - coverage
        - generatedBy
      properties:
        schemaVersion:
          type: integer
          const: 1
        datasetId:
          type: string
          minLength: 1
        artifact:
          $ref: "#/components/schemas/GeometryArtifact"
        source:
          $ref: "#/components/schemas/GeometrySource"
        review:
          $ref: "#/components/schemas/GeometryReview"
        coverage:
          $ref: "#/components/schemas/GeometryCoverage"
        generatedBy:
          $ref: "#/components/schemas/GeometryGenerator"
    GeometryArtifact:
      type: object
      additionalProperties: false
      required:
        - file
        - bytes
        - sha256
        - format
      properties:
        file:
          type: string
          const: reviewed-101-161.eclp
        bytes:
          type: integer
          minimum: 1
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        format:
          type: string
          const: saros-geo-eclp-v1
    GeometrySource:
      type: object
      additionalProperties: false
      required:
        - catalog
        - catalogUrl
        - geometryPipeline
        - importInput
        - sourceInputSha256
        - sourceFileCount
        - sourceBytes
        - importedAt
        - sourceRetrievalMetadata
        - sourceLicense
      properties:
        catalog:
          type: string
        catalogUrl:
          type: string
          format: uri
        geometryPipeline:
          type: string
        importInput:
          type: string
        sourceInputSha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        sourceFileCount:
          type: integer
          const: 61
        sourceBytes:
          type: integer
          const: 2056880
        importedAt:
          type: string
          format: date
        sourceRetrievalMetadata:
          type: string
        sourceLicense:
          $ref: "#/components/schemas/GeometrySourceLicense"
    GeometrySourceLicense:
      type: object
      additionalProperties: false
      required:
        - status
        - noticeUrl
        - attribution
      properties:
        status:
          type: string
          minLength: 1
        noticeUrl:
          type: string
          format: uri
        attribution:
          type: string
          minLength: 1
    GeometryReview:
      type: object
      additionalProperties: false
      required:
        - status
        - includedSeries
        - excludedSeries
      properties:
        status:
          type: string
          const: reviewed
        includedSeries:
          $ref: "#/components/schemas/SeriesRange"
        excludedSeries:
          type: string
    SeriesRange:
      type: object
      additionalProperties: false
      required:
        - start
        - end
      properties:
        start:
          type: integer
          const: 101
        end:
          type: integer
          const: 161
    GeometryCoverage:
      type: object
      additionalProperties: false
      required:
        - eclipseCount
        - pathPointCount
        - firstUnixSeconds
        - lastUnixSeconds
      properties:
        eclipseCount:
          type: integer
          const: 2044
        pathPointCount:
          type: integer
          const: 276576
        firstUnixSeconds:
          type: integer
          format: int64
        lastUnixSeconds:
          type: integer
          format: int64
    GeometryGenerator:
      type: object
      additionalProperties: false
      required:
        - script
        - generatorVersion
      properties:
        script:
          type: string
        generatorVersion:
          type: integer
          const: 1
    SarosPulse:
      type: object
      additionalProperties: false
      required:
        - anchorSaros
        - reading
        - glyphs
      properties:
        anchorSaros:
          type: integer
          minimum: 101
          maximum: 161
        reading:
          $ref: "#/components/schemas/SarosReading"
        glyphs:
          $ref: "#/components/schemas/PulseGlyphs"
    GlyphMetadata:
      type: object
      additionalProperties: false
      required:
        - grammarVersion
        - grammarSha256
        - geometryVersion
        - specSha256
        - font
        - radix
        - minimumDepth
        - maximumDepth
        - defaultDepth
        - coordinateSystem
        - strokeBits
      properties:
        grammarVersion:
          type: string
          const: 1.0.0
        grammarSha256:
          type: string
          const: fe0dbfd7aa3faa6174cf38d1844848b2276f731b102dafb2f3350ffa68c7f7c8
        geometryVersion:
          type: string
          const: 2.1.0
        specSha256:
          type: string
          const: f6457d5aa1533a30e0731b70715a5393bb696c317acaeb8c2a5ab0f18ae27a56
        font:
          $ref: "#/components/schemas/GlyphFont"
        radix:
          type: integer
          const: 8
        minimumDepth:
          type: integer
          const: 3
        maximumDepth:
          type: integer
          const: 8
        defaultDepth:
          type: integer
          const: 5
        coordinateSystem:
          $ref: "#/components/schemas/GlyphCoordinateSystem"
        strokeBits:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: "#/components/schemas/GlyphStroke"
    GlyphFont:
      type: object
      additionalProperties: false
      required:
        - id
        - version
        - geometryVersion
        - sha256
      properties:
        id:
          type: string
          const: fractonica-hex-v2
        version:
          type: string
          const: 1.0.0
        geometryVersion:
          type: string
          const: 2.1.0
        sha256:
          type: string
          const: b67a6132d41a061ee5b33acd6cbe70344cf7f809e6b86a7425d5df76a58ae7d8
    GlyphCoordinateSystem:
      type: object
      additionalProperties: false
      required:
        - origin
        - xAxis
        - yAxis
        - rotation
        - unit
      properties:
        origin:
          type: string
          const: glyphCentre
        xAxis:
          type: string
          const: right
        yAxis:
          type: string
          const: down
        rotation:
          type: string
          const: clockwise
        unit:
          type: string
          const: fontUnits
    GlyphStroke:
      type: object
      additionalProperties: false
      required:
        - id
        - bit
        - from
        - to
      properties:
        id:
          type: string
          enum: [left, centre, right]
        bit:
          type: integer
          enum: [1, 2, 4]
        from:
          type: string
          const: anchor
        to:
          type: string
          enum: [left, apex, right]
    GlyphGeometry:
      type: object
      additionalProperties: false
      required:
        - grammarVersion
        - grammarSha256
        - geometryVersion
        - specSha256
        - font
        - octal
        - depth
        - coordinateSystem
        - frame
        - primitives
      properties:
        grammarVersion:
          type: string
          const: 1.0.0
        grammarSha256:
          type: string
          const: fe0dbfd7aa3faa6174cf38d1844848b2276f731b102dafb2f3350ffa68c7f7c8
        geometryVersion:
          type: string
          const: 2.1.0
        specSha256:
          type: string
          const: f6457d5aa1533a30e0731b70715a5393bb696c317acaeb8c2a5ab0f18ae27a56
        font:
          $ref: "#/components/schemas/GlyphFont"
        octal:
          type: string
          pattern: "^[0-7]{3,8}$"
        depth:
          type: integer
          minimum: 3
          maximum: 8
        coordinateSystem:
          $ref: "#/components/schemas/GlyphCoordinateSystem"
        frame:
          $ref: "#/components/schemas/GlyphFrame"
        primitives:
          type: array
          minItems: 1
          maxItems: 9
          items:
            $ref: "#/components/schemas/GlyphPrimitive"
    GlyphFrame:
      type: object
      additionalProperties: false
      required:
        - x
        - y
        - width
        - height
        - aspectRatio
      properties:
        x:
          type: number
        y:
          type: number
        width:
          type: number
          exclusiveMinimum: 0
        height:
          type: number
          exclusiveMinimum: 0
        aspectRatio:
          type: number
          exclusiveMinimum: 0
    GlyphPrimitive:
      oneOf:
        - $ref: "#/components/schemas/GlyphCorePrimitive"
        - $ref: "#/components/schemas/GlyphArmPrimitive"
    GlyphCorePrimitive:
      type: object
      additionalProperties: false
      required:
        - kind
        - fillRule
        - contours
      properties:
        kind:
          type: string
          const: core
        fillRule:
          type: string
          const: evenodd
        contours:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/GlyphContour"
    GlyphArmPrimitive:
      type: object
      additionalProperties: false
      required:
        - kind
        - fillRule
        - socketIndex
        - digitIndex
        - digit
        - contours
      properties:
        kind:
          type: string
          const: arm
        fillRule:
          type: string
          const: nonzero
        socketIndex:
          type: integer
          minimum: 0
          maximum: 7
        digitIndex:
          type: integer
          minimum: 0
          maximum: 7
        digit:
          type: integer
          minimum: 1
          maximum: 7
        contours:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/GlyphContour"
    GlyphContour:
      type: object
      additionalProperties: false
      required:
        - points
      properties:
        points:
          type: array
          minItems: 3
          maxItems: 16
          items:
            $ref: "#/components/schemas/GlyphPoint"
    GlyphPoint:
      type: object
      additionalProperties: false
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number
    SarosReading:
      type: object
      additionalProperties: false
      required:
        - saros
        - at
        - previous
        - next
        - phase
        - phaseWordHex
        - projection
        - nextFlipAt
      properties:
        saros:
          type: integer
          minimum: 101
          maximum: 161
        at:
          $ref: "#/components/schemas/UnixTimestamp"
        previous:
          $ref: "#/components/schemas/EclipseIdentity"
        next:
          $ref: "#/components/schemas/EclipseIdentity"
        phase:
          $ref: "#/components/schemas/PhaseRatio"
        phaseWordHex:
          type: string
          pattern: "^[0-9a-f]{16}$"
        projection:
          $ref: "#/components/schemas/PhaseProjection"
        rarity:
          $ref: "#/components/schemas/Rarity"
        nextFlipAt:
          $ref: "#/components/schemas/UnixTimestamp"
    UnixTimestamp:
      type: object
      additionalProperties: false
      required:
        - unixSeconds
        - nanosecond
      properties:
        unixSeconds:
          type: integer
          format: int64
        nanosecond:
          type: integer
          minimum: 0
          maximum: 999999999
    EclipseIdentity:
      type: object
      additionalProperties: false
      required:
        - saros
        - sequence
        - unixSeconds
      properties:
        saros:
          type: integer
          minimum: 101
          maximum: 161
        sequence:
          type: integer
          minimum: 0
          maximum: 255
        unixSeconds:
          type: integer
          format: int64
    PhaseRatio:
      type: object
      additionalProperties: false
      required:
        - numerator
        - denominator
      properties:
        numerator:
          type: string
          pattern: "^[0-9]+$"
        denominator:
          type: string
          pattern: "^[1-9][0-9]*$"
    PhaseProjection:
      type: object
      additionalProperties: false
      required:
        - precisionBits
        - prefix
        - octal
        - trailingBits
        - trailingValue
      properties:
        precisionBits:
          type: integer
          minimum: 1
          maximum: 64
        prefix:
          type: string
          pattern: "^[0-9]+$"
        octal:
          type: string
          pattern: "^[0-7]*$"
        trailingBits:
          type: integer
          minimum: 0
          maximum: 2
        trailingValue:
          type: integer
          minimum: 0
          maximum: 3
    Rarity:
      type: object
      additionalProperties: false
      required:
        - family
        - digit
        - digitName
      properties:
        family:
          type: string
          enum: [common, triplex, duplex, simplex, nihil]
        digit:
          type: integer
          minimum: 0
          maximum: 7
        digitName:
          type: string
    PulseGlyphs:
      type: object
      additionalProperties: false
      required:
        - mostSignificant
        - leastSignificant
      properties:
        mostSignificant:
          type: string
          pattern: "^[0-7]{5}$"
        leastSignificant:
          type: string
          pattern: "^[0-7]{5}$"
    EclipsePath:
      type: object
      additionalProperties: false
      required:
        - geometryStatus
        - eclipse
        - metadata
        - geometry
      properties:
        geometryStatus:
          type: string
          const: reviewed
        eclipse:
          $ref: "#/components/schemas/EclipseIdentity"
        metadata:
          $ref: "#/components/schemas/EclipseMetadata"
        geometry:
          $ref: "#/components/schemas/GeoJsonMultiPolygon"
    EclipseMetadata:
      type: object
      additionalProperties: false
      required:
        - typeIndex
        - unixSeconds
        - latitude
        - longitude
        - sunAltitudeDegrees
        - magnitude
        - gamma
        - polygonCount
        - pathPointCount
      properties:
        typeIndex:
          type: integer
          minimum: 0
          maximum: 17
        unixSeconds:
          type: integer
          format: int64
        latitude:
          type: number
        longitude:
          type: number
        sunAltitudeDegrees:
          type: integer
          minimum: 0
          maximum: 127
        magnitude:
          type: number
        gamma:
          type: number
        centralDurationSeconds:
          type: [integer, "null"]
          minimum: 0
        centralWidthKm:
          type: [integer, "null"]
          minimum: 0
        polygonCount:
          type: integer
          minimum: 0
          maximum: 31
        pathPointCount:
          type: integer
          minimum: 0
          maximum: 300000
    GeoJsonMultiPolygon:
      type: object
      additionalProperties: false
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          const: MultiPolygon
        coordinates:
          type: array
          items:
            type: array
            items:
              type: array
              items:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: number
    Problem:
      type: object
      additionalProperties: false
      required:
        - type
        - code
        - title
        - status
      properties:
        type:
          type: string
          format: uri-reference
        code:
          type: string
          minLength: 1
          maxLength: 64
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
