name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install Node.js for sidecar preparation
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Prepare desktop node sidecar
        run: node apps/desktop/scripts/prepare-sidecar.mjs

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check embedded temporal core
        run: cargo check -p fractonica-temporal-core --no-default-features --locked

      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features --locked

  embedded-c:
    name: Embedded C SDK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure host conformance build
        run: >-
          cmake -S sdk/embedded-c -B build/embedded-c
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=Release

      - name: Build with warnings as errors
        run: cmake --build build/embedded-c --parallel

      - name: Run C and C++ SDK tests
        run: ctest --test-dir build/embedded-c --output-on-failure

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  desktop:
    name: Desktop assembly
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare desktop node sidecar
        run: pnpm --filter @fractonica/desktop prepare:sidecar

      - name: Assemble desktop application
        run: pnpm --filter @fractonica/desktop exec tauri build --debug --no-bundle
